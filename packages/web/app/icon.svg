<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Floe">
  <defs>
    <linearGradient id="favTile" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141821"/>
      <stop offset="1" stop-color="#0a0c11"/>
    </linearGradient>
    <linearGradient id="favProvenL" x1="50" y1="44" x2="40" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6df8ea"/>
      <stop offset="1" stop-color="#1ac6b6"/>
    </linearGradient>
    <linearGradient id="favProvenR" x1="60" y1="44" x2="54" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#19c2b3"/>
      <stop offset="1" stop-color="#0a665f"/>
    </linearGradient>
    <linearGradient id="favFrostL" x1="50" y1="18" x2="35" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d2faf4" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#74ebde" stop-opacity="0.48"/>
    </linearGradient>
    <linearGradient id="favFrostR" x1="50" y1="18" x2="65" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b6f4ec" stop-opacity="0.56"/>
      <stop offset="1" stop-color="#56ddd0" stop-opacity="0.30"/>
    </linearGradient>
  </defs>

  <rect width="100" height="100" rx="24" fill="url(#favTile)"/>
  <rect x="0.6" y="0.6" width="98.8" height="98.8" rx="23.4" fill="none" stroke="#eafffb" stroke-opacity="0.06"/>

  <!-- crystal, inset with padding -->
  <polygon points="50,20 27,44 50,44" fill="url(#favFrostL)"/>
  <polygon points="50,20 73,44 50,44" fill="url(#favFrostR)"/>
  <polygon points="27,44 50,44 50,82" fill="url(#favProvenL)"/>
  <polygon points="73,44 50,44 50,82" fill="url(#favProvenR)"/>
  <g fill="none" stroke="#eafffb" stroke-opacity="0.18" stroke-width="0.9" stroke-linejoin="round">
    <polygon points="50,20 73,44 50,82 27,44"/>
    <line x1="50" y1="20" x2="50" y2="82"/>
  </g>
  <rect x="19" y="41.2" width="62" height="5.6" rx="2.8" fill="#34e6d6" fill-opacity="0.22"/>
  <rect x="22" y="42.7" width="56" height="2.6" rx="1.3" fill="#eafffb"/>
