[package]
name = "floe_lend"
edition = "2024"

[dependencies]
enclave = { git = "https://github.com/MystenLabs/nautilus.git", subdir = "move/enclave", rev = "af7535b9d314f034fa7f9f1f208264540d54cde1" }
floe_nav = { local = "../floe_nav" }
# Vault-read borrow path: reference Vault<Q,S> + its attested-NAV accessors from the floe package.
floe = { local = "../move" }

[addresses]
floe_lend = "0x0"
# Link against the on-chain enclave + floe_nav + floe: only types/accessors are referenced
# (enclave::verify_signature → enclave; FLOE_NAV phantom → floe_nav origin; Vault + nav_lower_bound/
# share_supply/is_price_fresh → floe origin). Each address is the dependency's ORIGINAL published id.
enclave = "0x8ecf22e78c90c3e32833d76d82415d7e4227ea370bec4efdad4c4830cbda9e49"
floe_nav = "0xc9bae1737b1744108491f6c4d7c87128520d6b61151d9e3bc23c262cbc0026e0"
floe = "0x1aacf4f9f787807d811c058e4a3194f48b2ad30f50096c0713668b656bbd6003"
