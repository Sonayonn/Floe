[package]
name = "floe"
edition = "2024"         # edition = "legacy" to use legacy (pre-2024) Move
# license = ""           # e.g., "MIT", "GPL", "Apache 2.0"
# authors = ["..."]      # e.g., ["Joe Smith (joesmith@noemail.com)", "John Snow (johnsnow@noemail.com)"]

[dependencies]

# Read more about the package management system options:
# https://docs.sui.io/guides/developer/sui-101/move-package-management

[addresses]
# Declare the self-binding (legacy address style) so legacy-style dependents (floe_lend) can take
# this package as a local dependency — mirrors floe_nav. "0x0" is the publish-time placeholder; the
# on-chain id is resolved from Move.lock / the explicit package arg at upgrade time.
floe = "0x0"
